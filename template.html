<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Germany NRV Balance</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; padding: 20px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  h2 { font-size: 15px; font-weight: 600; margin: 24px 0 10px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
  .updated { font-size: 11px; color: #aaa; margin-bottom: 16px; }
  .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-bottom: 14px; }
  .ctrl-group { display: flex; align-items: center; gap: 6px; }
  .ctrl-group label { font-size: 12px; color: #555; }
  select, input[type=date] { font-size: 12px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 5px; background: #fff; cursor: pointer; }
  .legend-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .grad { width: 180px; height: 10px; border-radius: 3px; background: linear-gradient(to right, #b22222, #e8a0a0, #f5f0ee, #a0d4b0, #1a7a3a); }
  .legend-wrap span { font-size: 11px; color: #666; }
  .panel { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 14px 16px; margin-bottom: 18px; }
  .daterange { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  .daterange label { font-size: 12px; color: #555; font-weight: 600; }
  .quick-btn { font-size: 11px; font-weight: 600; padding: 4px 10px; border: 1px solid #bbb; border-radius: 5px; background: #f7f5f1; cursor: pointer; color: #333; }
  .quick-btn:hover { background: #e8e4dc; }
  .day-filter { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; margin-bottom: 12px; }
  .df-btn { font-size: 11px; font-weight: 600; padding: 3px 8px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; color: #555; }
  .df-btn.active { background: #3266ad; color: #fff; border-color: #3266ad; }
  .df-btn.df-special { background: #f7f5f1; border-color: #bbb; color: #333; }
  .df-btn.df-special:hover { background: #e8e4dc; }
  .df-sep { width: 1px; height: 20px; background: #ddd; margin: 0 4px; display: inline-block; }
  .table-outer { overflow: auto; max-height: 80vh; border: 1px solid #ddd; border-radius: 8px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  table { border-collapse: collapse; font-size: 11px; white-space: nowrap; }
  th, td { padding: 0; border: 0; }
  .th-corner { position: sticky; left: 0; top: 0; z-index: 5; background: #f0ede8; padding: 5px 10px; font-size: 10px; color: #888; border-right: 1px solid #d5d2cc; border-bottom: 1px solid #d5d2cc; min-width: 90px; }
  .th-day { position: sticky; top: 0; z-index: 3; background: #f0ede8; padding: 5px 6px; text-align: center; font-weight: 600; font-size: 11px; color: #444; border-bottom: 1px solid #d5d2cc; min-width: 40px; }
  .th-day.weekend { color: #3266ad; background: #eaf0fb; }
  .th-day.target { background: #fff3cd; color: #8a6d00; }
  .th-row { position: sticky; left: 0; z-index: 2; background: #f7f5f1; padding: 2px 8px; border-right: 1px solid #d5d2cc; font-size: 10px; line-height: 1.3; min-width: 90px; }
  .th-row .hour { font-weight: 600; color: #222; }
  .th-row .qtr { color: #999; margin-left: 3px; }
  td.cell { text-align: center; padding: 2px 2px; font-size: 9.5px; font-weight: 600; min-width: 40px; height: 19px; cursor: default; }
  td.cell:hover { outline: 2px solid #333; outline-offset: -1px; position: relative; z-index: 1; }
  td.cell.target-col { box-shadow: inset 2px 0 0 #f0c040, inset -2px 0 0 #f0c040; }
  .th-avg { position: sticky; top: 0; right: 0; z-index: 4; background: #e8e4dc; padding: 5px 6px; text-align: center; font-weight: 700; font-size: 11px; color: #333; border-bottom: 1px solid #d5d2cc; border-left: 2px solid #bbb; min-width: 90px; }
  td.avg-cell { position: sticky; right: 0; z-index: 1; padding: 1px 4px; font-size: 9.5px; font-weight: 700; min-width: 90px; height: 19px; border-left: 2px solid #bbb; display: table-cell; vertical-align: middle; }
  .avg-inner { display: flex; align-items: center; justify-content: space-between; gap: 3px; }
  .avg-pct { font-size: 8.5px; font-weight: 700; padding: 1px 4px; border-radius: 3px; }
  .avg-pct.up { background: rgba(26,122,58,0.18); color: #145a2d; }
  .avg-pct.down { background: rgba(178,34,34,0.15); color: #8b1a1a; }
  .hour-sep td, .hour-sep th { border-top: 1px solid #ccc; }
  .tooltip { position: fixed; background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 7px 11px; font-size: 11px; color: #222; pointer-events: none; display: none; z-index: 9999; box-shadow: 0 3px 10px rgba(0,0,0,0.12); line-height: 1.6; }
  .stat-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .stat { background: #fff; border: 1px solid #ddd; border-radius: 7px; padding: 8px 14px; min-width: 110px; }
  .stat-label { font-size: 10px; color: #888; margin-bottom: 2px; }
  .stat-value { font-size: 18px; font-weight: 600; color: #222; }
  .stat-sub { font-size: 10px; color: #aaa; }
  .empty-msg { padding: 30px; text-align: center; color: #999; font-size: 13px; }
  /* Similarity panel */
  .sim-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-bottom: 12px; }
  .sim-window { display: flex; gap: 4px; }
  .win-btn { font-size: 12px; font-weight: 600; padding: 5px 14px; border: 1px solid #bbb; border-radius: 5px; background: #f7f5f1; cursor: pointer; color: #333; }
  .win-btn.active { background: #3266ad; color: #fff; border-color: #3266ad; }
  .sim-info { font-size: 12px; color: #666; margin-bottom: 12px; }
  .sim-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .sim-table th { text-align: left; padding: 7px 10px; border-bottom: 2px solid #ddd; color: #555; font-weight: 600; cursor: pointer; user-select: none; }
  .sim-table th:hover { color: #3266ad; }
  .sim-table th .arrow { font-size: 9px; color: #3266ad; }
  .sim-table td { padding: 7px 10px; border-bottom: 1px solid #eee; }
  .sim-table tr:hover td { background: #f7f9fc; }
  .sim-rank { font-weight: 700; color: #3266ad; width: 30px; }
  .sim-date { font-weight: 600; }
  .sim-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .sim-bar { height: 8px; border-radius: 4px; background: #3266ad; min-width: 2px; }
  .sim-view-btn { font-size: 11px; font-weight: 600; padding: 3px 10px; border: 1px solid #3266ad; border-radius: 4px; background: #fff; color: #3266ad; cursor: pointer; }
  .sim-view-btn:hover { background: #3266ad; color: #fff; }
  .match-good { color: #145a2d; font-weight: 700; }
  .match-mid { color: #8a6d00; font-weight: 600; }
  .match-low { color: #8b1a1a; font-weight: 600; }
</style>
</head>
<body>
<h1>Germany NRV Balance (System Direction)</h1>
<p class="subtitle">15-min quarters per hour x day (Germany time) | Unit: MW | Positive = Short, Negative = Long</p>
<p class="updated">Last updated: __UPDATED_AT__ (Berlin)</p>

<div class="stat-row" id="statRow"></div>

<div class="panel daterange">
  <label>From:</label>
  <input type="date" id="startDate" min="__FIRST_DATE__" max="__LAST_DATE__" value="__FIRST_DATE__">
  <label>To:</label>
  <input type="date" id="endDate" min="__FIRST_DATE__" max="__LAST_DATE__" value="__LAST_DATE__">
  <button class="quick-btn" data-range="7">Last 7 days</button>
  <button class="quick-btn" data-range="15">Last 15 days</button>
  <button class="quick-btn" data-range="30">Last 30 days</button>
  <button class="quick-btn" data-range="all">All</button>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Color scale:</label>
    <select id="scaleMode">
      <option value="global">Global</option>
      <option value="sym500">+/-500 MW</option>
      <option value="sym1000">+/-1000 MW</option>
      <option value="row">Row-relative</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Display:</label>
    <select id="viewMode">
      <option value="value">Value (MW)</option>
      <option value="sign">Direction (+/-)</option>
      <option value="abs">Absolute</option>
    </select>
  </div>
</div>

<div class="day-filter" id="dayFilter">
  <span style="font-size:12px;color:#555;margin-right:6px">Quick:</span>
  <button class="df-btn df-special" data-action="all">All in range</button>
  <button class="df-btn df-special" data-action="weekdays">Weekdays</button>
  <button class="df-btn df-special" data-action="weekends">Weekends</button>
  <span class="df-sep"></span>
</div>

<div class="legend-wrap">
  <span>Long (-)</span>
  <div class="grad"></div>
  <span>(+) Short</span>
</div>

<div style="display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap;">
  <div style="flex:1 1 480px; min-width:420px;">
    <div style="font-size:13px;font-weight:600;margin-bottom:6px;">NRV Saldo (MW)</div>
    <div class="table-outer" id="tableOuter"></div>
  </div>
  <div style="flex:1 1 480px; min-width:420px;">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap;">
      <span style="font-size:13px;font-weight:600;">Spread:</span>
      <select id="var1">
        <option value="aep" selected>IMBALANCE (AEP)</option>
        <option value="id1">ID1</option>
        <option value="id3">ID3</option>
        <option value="spot">SPOT</option>
        <option value="vwap">VWAP</option>
      </select>
      <span style="font-weight:700;">-</span>
      <select id="var2">
        <option value="aep">IMBALANCE (AEP)</option>
        <option value="id1" selected>ID1</option>
        <option value="id3">ID3</option>
        <option value="spot">SPOT</option>
        <option value="vwap">VWAP</option>
      </select>
      <span style="font-size:11px;color:#888">EUR/MWh</span>
    </div>
    <div class="table-outer" id="spreadOuter"></div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>

<!-- ============ SIMILARITY PANEL ============ -->
<h2>Pattern Matching - Most Similar Days</h2>
<div class="panel">
  <div class="sim-controls">
    <div class="ctrl-group">
      <label>Lookback window:</label>
      <div class="sim-window">
        <button class="win-btn active" data-win="2">Last 2 hours</button>
        <button class="win-btn" data-win="3">Last 3 hours</button>
      </div>
    </div>
    <div class="ctrl-group">
      <label>Forward window:</label>
      <div class="sim-window">
        <button class="fwd-btn active" data-fwd="2">+2 hours</button>
        <button class="fwd-btn" data-fwd="4">+4 hours</button>
      </div>
    </div>
    <div class="ctrl-group">
      <label>Sort by:</label>
      <select id="simSort">
        <option value="quarter">Quarter match</option>
        <option value="saldo">Saldo closeness</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Compare against:</label>
      <select id="simScope">
        <option value="range">Selected date range</option>
        <option value="all">All days</option>
      </select>
    </div>
  </div>
  <div class="sim-info" id="simInfo"></div>
  <table class="sim-table" id="simTable"></table>
</div>

<script>
const ALL_DATA = __DATA_JSON__;
const AEP_DATA  = __AEP_JSON__;
const ID1_DATA  = __ID1_JSON__;
const ID3_DATA  = __ID3_JSON__;
const SPOT_DATA = __SPOT_JSON__;
const VWAP_DATA = __VWAP_JSON__;
const ALL_DATES = Object.keys(ALL_DATA).sort();

function metricVal(metric, ds, key) {
  if (metric === "saldo") return (ALL_DATA[ds] && ALL_DATA[ds][key] !== undefined) ? ALL_DATA[ds][key] : null;
  if (metric === "aep")   return (AEP_DATA[ds]  && AEP_DATA[ds][key]  !== undefined) ? AEP_DATA[ds][key]  : null;
  if (metric === "id1")   return (ID1_DATA[ds]  && ID1_DATA[ds][key]  !== undefined) ? ID1_DATA[ds][key]  : null;
  if (metric === "vwap")  return (VWAP_DATA[ds] && VWAP_DATA[ds][key] !== undefined) ? VWAP_DATA[ds][key] : null;
  if (metric === "id3")   return (ID3_DATA[ds]  && ID3_DATA[ds][key]  !== undefined) ? ID3_DATA[ds][key]  : null;
  if (metric === "spot")  return (SPOT_DATA[ds] && SPOT_DATA[ds][key] !== undefined) ? SPOT_DATA[ds][key] : null;
  if (metric === "pnl") {
    const a = (AEP_DATA[ds] && AEP_DATA[ds][key] !== undefined) ? AEP_DATA[ds][key] : null;
    const i = (ID1_DATA[ds] && ID1_DATA[ds][key] !== undefined) ? ID1_DATA[ds][key] : null;
    if (a === null || i === null) return null;
    return Math.round((a - i) * 100) / 100;
  }
  return null;
}
function metricUnit(metric){ return metric === "saldo" ? "MW" : "EUR/MWh"; }

const ROWS = [];
for (let h = 0; h < 24; h++)
  for (const q of ["Q1","Q2","Q3","Q4"])
    ROWS.push(String(h).padStart(2,"0") + "-" + q);

const QTR_MIN = {Q1:"00",Q2:"15",Q3:"30",Q4:"45"};
const DOW_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function dowOf(ds) { const [y,m,d]=ds.split("-").map(Number); return DOW_NAMES[new Date(y,m-1,d).getDay()]; }
function isWeekend(ds){ const [y,m,d]=ds.split("-").map(Number); const w=new Date(y,m-1,d).getDay(); return w===0||w===6; }
function dayNum(ds){ return Number(ds.split("-")[2]); }

const tooltip = document.getElementById("tooltip");
let activeDates = new Set();
let highlightDate = null;   // benzerlik panelinden secilen gun
let simWindow = 2;          // saat (geriye)
let fwdWindow = 2;          // saat (ileriye)

function spreadValFor(v1, v2, ds, key){
  const a = metricVal(v1, ds, key), b = metricVal(v2, ds, key);
  if (a === null || b === null) return null;
  return Math.round((a - b) * 100) / 100;
}
function shiftDateStr(ds, off){
  const [y,m,d] = ds.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m-1, d + off));
  return dt.toISOString().slice(0,10);
}
// Ileri pencere: icinde bulunulan ceyrekten saat sonuna kadar + sonraki N saat
function forwardSpec(fwdHours){
  const nb = nowBerlin();
  const startIdx = nb.hour*4 + Math.floor(nb.minute/15);
  const endIdx = (nb.hour + 1 + fwdHours)*4 - 1;
  const items = [];
  for(let i=startIdx; i<=endIdx; i++){
    const off = Math.floor(i/96);
    const idx = i % 96;
    const h = Math.floor(idx/4), q = idx%4;
    items.push({off: off, key: String(h).padStart(2,"0")+"-Q"+(q+1)});
  }
  return items;
}

function datesInRange() {
  const s = document.getElementById("startDate").value;
  const e = document.getElementById("endDate").value;
  return ALL_DATES.filter(d => d >= s && d <= e);
}
function resetActiveToRange() { activeDates = new Set(datesInRange()); }

// ---------- Day filter butonlari ----------
function buildDayFilter() {
  const container = document.getElementById("dayFilter");
  container.querySelectorAll(".df-btn[data-date]").forEach(b => b.remove());
  const sep = container.querySelector(".df-sep");
  datesInRange().forEach(ds => {
    const btn = document.createElement("button");
    btn.className = "df-btn" + (activeDates.has(ds) ? " active" : "");
    btn.dataset.date = ds;
    btn.textContent = dayNum(ds) + " " + dowOf(ds);
    if (isWeekend(ds)) btn.style.color = activeDates.has(ds) ? "#fff" : "#3266ad";
    btn.addEventListener("click", () => {
      if (activeDates.has(ds)) {
        if (activeDates.size > 1) { activeDates.delete(ds); btn.classList.remove("active"); btn.style.color = isWeekend(ds)?"#3266ad":"#555"; }
      } else { activeDates.add(ds); btn.classList.add("active"); if(isWeekend(ds)) btn.style.color="#fff"; }
      buildStats(); render(); renderSpread();
    });
    container.insertBefore(btn, sep.nextSibling);
  });
  container.querySelector("[data-action=all]").onclick = () => { resetActiveToRange(); buildDayFilter(); buildStats(); render(); renderSpread(); };
  container.querySelector("[data-action=weekdays]").onclick = () => { activeDates = new Set(datesInRange().filter(d=>!isWeekend(d))); buildDayFilter(); buildStats(); render(); renderSpread(); };
  container.querySelector("[data-action=weekends]").onclick = () => { activeDates = new Set(datesInRange().filter(d=>isWeekend(d))); buildDayFilter(); buildStats(); render(); renderSpread(); };
}

// ---------- Ust istatistikler ----------
function buildStats() {
  const dates = Array.from(activeDates).sort();
  const allVals = [];
  ROWS.forEach(r => dates.forEach(ds => { const v = ALL_DATA[ds]?ALL_DATA[ds][r]:undefined; if(v!==undefined) allVals.push(v); }));
  if (!allVals.length) { document.getElementById("statRow").innerHTML=""; return; }
  const pos = allVals.filter(v=>v>0).length;
  const neg = allVals.filter(v=>v<0).length;
  const avg = Math.round(allVals.reduce((a,b)=>a+b,0)/allVals.length);
  const stats = [
    {label:"Total quarters", value: allVals.length, sub:""},
    {label:"Short (positive)", value: pos, sub:(pos/allVals.length*100).toFixed(1)+"%"},
    {label:"Long (negative)", value: neg, sub:(neg/allVals.length*100).toFixed(1)+"%"},
    {label:"Average", value:(avg>0?"+":"")+avg+" MW", sub:""},
    {label:"Min", value: Math.min(...allVals)+" MW", sub:""},
    {label:"Max", value: Math.max(...allVals)+" MW", sub:""},
  ];
  document.getElementById("statRow").innerHTML = stats.map(s =>
    '<div class="stat"><div class="stat-label">'+s.label+'</div><div class="stat-value">'+s.value+'</div><div class="stat-sub">'+s.sub+'</div></div>'
  ).join("");
}

// ---------- Renkler ----------
function getColor(v, mn, mx) {
  if (v === 0) return "#f0ede8";
  if (v > 0) { const t=Math.min(v/mx,1); return "rgb("+Math.round(220-t*110)+","+Math.round(235-t*50)+","+Math.round(220-t*140)+")"; }
  const t=Math.min(Math.abs(v)/Math.abs(mn),1); return "rgb("+Math.round(220+t*80)+","+Math.round(220-t*150)+","+Math.round(220-t*150)+")";
}
function textCol(v, mn, mx){ return (v>=0?v/mx:Math.abs(v)/Math.abs(mn))>0.55?"#fff":"#333"; }
function fmtVal(v, mode){
  if(mode==="sign") return v>0?"+":v<0?"-":"0";
  if(mode==="abs") return Math.abs(v)>=1000?(Math.abs(v)/1000).toFixed(1)+"k":String(Math.abs(v));
  if(Math.abs(v)>=1000) return (v>0?"+":"")+(v/1000).toFixed(1)+"k";
  return (v>0?"+":"")+v;
}

// ---------- Ana tablo ----------
function render() {
  const dates = Array.from(activeDates).sort();
  const scaleMode = document.getElementById("scaleMode").value;
  const viewMode  = document.getElementById("viewMode").value;
  if (!dates.length){ document.getElementById("tableOuter").innerHTML='<div class="empty-msg">No dates selected.</div>'; return; }

  const metric = "saldo";
  let gMin=Infinity, gMax=-Infinity;
  ROWS.forEach(r=>dates.forEach(ds=>{ const v=metricVal(metric,ds,r); if(v!==null){gMin=Math.min(gMin,v);gMax=Math.max(gMax,v);} }));
  if(scaleMode==="sym500"){gMin=-500;gMax=500;}
  if(scaleMode==="sym1000"){gMin=-1000;gMax=1000;}
  if(gMin===Infinity){gMin=-100;gMax=100;}

  let html="<table><thead><tr>";
  html+='<th class="th-corner">Hour / Qtr</th>';
  dates.forEach(ds=>{
    let cls="th-day";
    if(isWeekend(ds)) cls+=" weekend";
    if(ds===highlightDate) cls+=" target";
    html+='<th class="'+cls+'"><div>'+dayNum(ds)+'</div><div style="font-size:9px;font-weight:400;color:#aaa">'+dowOf(ds)+'</div></th>';
  });
  html+='<th class="th-avg"><div style="display:flex;gap:6px;justify-content:center">Avg MW <span style="font-size:9px;color:#999;font-weight:400">| Short%</span></div></th>';
  html+="</tr></thead><tbody>";

  ROWS.forEach(rowKey=>{
    const [hr,qr]=rowKey.split("-");
    const isQ1=qr==="Q1";
    const rowVals=dates.map(ds=>metricVal(metric,ds,rowKey));
    let rMin=Infinity,rMax=-Infinity;
    if(scaleMode==="row") rowVals.forEach(v=>{if(v!==null){rMin=Math.min(rMin,v);rMax=Math.max(rMax,v);}});
    const useMin=scaleMode==="row"?(rMin===Infinity?-100:rMin):gMin;
    const useMax=scaleMode==="row"?(rMax===-Infinity?100:rMax):gMax;

    html+="<tr"+(isQ1?' class="hour-sep"':"")+">";
    html+='<th class="th-row"><span class="hour">'+hr+':00</span><span class="qtr">'+qr+'</span></th>';
    rowVals.forEach((v,di)=>{
      const ds=dates[di];
      let wb=isWeekend(ds)?"border-left:2px solid #c0d4f0;":"";
      const tcls = ds===highlightDate ? " target-col" : "";
      if(v===null){html+='<td class="cell'+tcls+'" style="background:#f5f4f0;color:#ccc;'+wb+'">-</td>';return;}
      const bg=getColor(v,useMin,useMax), tc=textCol(v,useMin,useMax);
      html+='<td class="cell'+tcls+'" style="background:'+bg+';color:'+tc+';'+wb+'" data-v="'+v+'" data-row="'+rowKey+'" data-date="'+ds+'">'+fmtVal(v,viewMode)+'</td>';
    });
    const valid=rowVals.filter(v=>v!==null);
    if(valid.length){
      const avg=Math.round(valid.reduce((a,b)=>a+b,0)/valid.length*100)/100;
      const posPct=Math.round(valid.filter(v=>v>0).length/valid.length*100);
      const pctClass=posPct>=50?"up":"down";
      let pctLabel="";
      if(metric==="saldo") pctLabel=posPct>=50?"S "+posPct+"%":"L "+(100-posPct)+"%";
      else if(metric==="pnl") pctLabel="+"+posPct+"%";
      const badge = pctLabel ? '<span class="avg-pct '+pctClass+'">'+pctLabel+'</span>' : "";
      html+='<td class="avg-cell" style="background:'+getColor(avg,useMin,useMax)+';color:'+textCol(avg,useMin,useMax)+'" data-v="'+avg+'" data-row="'+rowKey+'" data-date="avg"><div class="avg-inner"><span>'+fmtVal(avg,viewMode)+'</span>'+badge+'</div></td>';
    } else { html+='<td class="avg-cell" style="background:#f0ede8;color:#ccc">-</td>'; }
    html+="</tr>";
  });
  html+="</tbody></table>";
  document.getElementById("tableOuter").innerHTML=html;

  document.getElementById("tableOuter").querySelectorAll("td[data-v]").forEach(td=>{
    td.addEventListener("mousemove",e=>{
      const v=parseFloat(td.dataset.v);
      const [hr,qr]=td.dataset.row.split("-");
      const ds=td.dataset.date;
      const mmode="saldo";
      const dir=v>0?"Short":v<0?"Long":"Balanced";
      const dc=v>0?"#1a7a3a":v<0?"#b22222":"#888";
      const label=ds==="avg"?hr+":"+QTR_MIN[qr]+" - Average":ds+" "+dowOf(ds)+" "+hr+":"+QTR_MIN[qr];
      let extra="";
      if(ds!=="avg"){
        const s=metricVal("saldo",ds,td.dataset.row), a=metricVal("aep",ds,td.dataset.row),
              i1=metricVal("id1",ds,td.dataset.row), p=metricVal("pnl",ds,td.dataset.row);
        extra+="<br><span style='color:#666'>Saldo: "+(s===null?"-":(s>0?"+":"")+s+" MW")+"</span>";
        extra+="<br><span style='color:#666'>AEP: "+(a===null?"-":a)+" | ID1: "+(i1===null?"-":i1)+"</span>";
        if(p!==null) extra+="<br><span style='font-weight:600;color:"+(p>0?"#1a7a3a":"#b22222")+"'>Long P&L: "+(p>0?"+":"")+p+" EUR/MWh</span>";
      }
      const mainLine = mmode==="saldo"
        ? "<span style=\"color:"+dc+";font-weight:600\">"+dir+": "+(v>0?"+":"")+v+" MW</span>"
        : "<span style=\"font-weight:600\">"+(v>0?"+":"")+v+" "+metricUnit(mmode)+"</span>";
      tooltip.style.display="block";
      tooltip.style.left=(e.clientX+14)+"px";
      tooltip.style.top=(e.clientY-40)+"px";
      tooltip.innerHTML="<b>"+label+"</b><br>"+mainLine+extra;
    });
    td.addEventListener("mouseleave",()=>{tooltip.style.display="none";});
  });
}

// ============ BENZERLIK (PATTERN MATCHING) ============

// Almanya saatini al (tarayicidan bagimsiz)
function nowBerlin() {
  const fmt = new Intl.DateTimeFormat("en-CA", {
    timeZone:"Europe/Berlin", year:"numeric", month:"2-digit", day:"2-digit",
    hour:"2-digit", minute:"2-digit", hour12:false
  });
  const parts = {};
  fmt.formatToParts(new Date()).forEach(p => parts[p.type]=p.value);
  return { date: parts.year+"-"+parts.month+"-"+parts.day, hour: Number(parts.hour), minute: Number(parts.minute) };
}

// Pencere icindeki ROW key'lerini uret (su anki Berlin saatinden geriye N saat)
function windowKeys(winHours) {
  const nb = nowBerlin();
  // Mevcut tamamlanmis ceyrege kadar geriye git
  // Su anki saat:dakika -> en son tamamlanan ceyrek
  let endIdx = nb.hour * 4 + Math.floor(nb.minute / 15); // 0..95, su anki ceyrek (henuz tamamlanmamis)
  // tamamlanan son ceyrek = endIdx - 1
  const lastDone = endIdx - 1;
  const count = winHours * 4;
  const keys = [];
  for (let i = lastDone - count + 1; i <= lastDone; i++) {
    if (i < 0) continue; // gun basindan once
    const h = Math.floor(i/4), q = i%4;
    keys.push(String(h).padStart(2,"0")+"-"+["Q1","Q2","Q3","Q4"][q]);
  }
  return { keys, targetDate: nb.date, nb };
}

function computeSimilarity() {
  const { keys, targetDate, nb } = windowKeys(simWindow);
  const info = document.getElementById("simInfo");
  const tableEl = document.getElementById("simTable");

  if (!keys.length) {
    info.innerHTML = "Not enough completed quarters yet today for the selected window.";
    tableEl.innerHTML = "";
    return;
  }

  const targetVals = keys.map(k => (ALL_DATA[targetDate] && ALL_DATA[targetDate][k] !== undefined) ? ALL_DATA[targetDate][k] : null);
  const haveTarget = targetVals.filter(v => v !== null).length;

  if (haveTarget === 0) {
    info.innerHTML = "Target day ("+targetDate+") has no data yet for "+keys[0]+" .. "+keys[keys.length-1]+".";
    tableEl.innerHTML = "";
    return;
  }

  // Aday gunler
  const scope = document.getElementById("simScope").value;
  let candidates = (scope === "range") ? datesInRange() : ALL_DATES.slice();
  candidates = candidates.filter(d => d !== targetDate);

  const results = [];
  candidates.forEach(ds => {
    let sumAbs = 0, n = 0, match = 0, matchTotal = 0;
    keys.forEach((k, i) => {
      const tv = targetVals[i];
      const cv = (ALL_DATA[ds] && ALL_DATA[ds][k] !== undefined) ? ALL_DATA[ds][k] : null;
      if (tv === null || cv === null) return;
      sumAbs += Math.abs(tv - cv);
      n++;
      // ceyrek yon eslesmesi (ikisi de poz veya ikisi de neg)
      matchTotal++;
      if ((tv > 0 && cv > 0) || (tv < 0 && cv < 0) || (tv === 0 && cv === 0)) match++;
    });
    if (n === 0) return;
    results.push({
      date: ds,
      mae: sumAbs / n,            // ort. mutlak fark (MW) - dusuk = benzer
      match: match,
      matchTotal: matchTotal,
      matchPct: matchTotal ? Math.round(match/matchTotal*100) : 0,
      n: n
    });
  });

  if (!results.length) {
    info.innerHTML = "No candidate days with overlapping data.";
    tableEl.innerHTML = "";
    return;
  }

  // Siralama
  const sortBy = document.getElementById("simSort").value;
  if (sortBy === "saldo") {
    results.sort((a,b) => a.mae - b.mae);            // dusuk MAE once
  } else {
    results.sort((a,b) => b.matchPct - a.matchPct || a.mae - b.mae);
  }

  const winLabel = keys[0]+" .. "+keys[keys.length-1];
  const fv1 = document.getElementById("var1").value;
  const fv2 = document.getElementById("var2").value;
  const fitems = forwardSpec(fwdWindow);
  const fwdLabel = VAR_LABELS[fv1]+" - "+VAR_LABELS[fv2];
  const fFirst = fitems[0], fLast = fitems[fitems.length-1];
  info.innerHTML = "Target: <b>"+targetDate+" ("+dowOf(targetDate)+")</b> | lookback: <b>"+winLabel+"</b> ("+haveTarget+" q with data) | forward: <b>"+fFirst.key+(fFirst.off?" (+1d)":"")+" .. "+fLast.key+(fLast.off?" (+1d)":"")+"</b> ("+fitems.length+" q, spread "+fwdLabel+") | comparing "+results.length+" days. Now (Berlin): "+nb.date+" "+String(nb.hour).padStart(2,"0")+":"+String(nb.minute).padStart(2,"0");

  const maxMae = Math.max(...results.map(r=>r.mae)) || 1;

  let html = "<thead><tr>"
    + "<th>#</th>"
    + "<th>Date</th>"
    + "<th>Day</th>"
    + "<th data-s='quarter'>Quarter match</th>"
    + "<th data-s='saldo'>Saldo closeness (avg diff)</th>"
    + "<th>Fwd "+fwdLabel+" avg</th>"
    + "<th>Fwd pos%</th>"
    + "<th></th>"
    + "</tr></thead><tbody>";

  results.slice(0, 30).forEach((r, idx) => {
    const mcls = r.matchPct >= 75 ? "match-good" : r.matchPct >= 50 ? "match-mid" : "match-low";
    const closeness = Math.round((1 - r.mae/maxMae) * 100);

    // Ileri pencere spread istatistikleri (o gunun ayni saat diliminde ne olmus)
    const fvals = fitems.map(it => spreadValFor(fv1, fv2, shiftDateStr(r.date, it.off), it.key)).filter(v => v !== null);
    let fwdAvgCell = "<span style='color:#bbb'>-</span>", fwdPosCell = "<span style='color:#bbb'>-</span>";
    if (fvals.length) {
      const favg = Math.round(fvals.reduce((a,b)=>a+b,0)/fvals.length*100)/100;
      const fpos = Math.round(fvals.filter(v=>v>0).length/fvals.length*100);
      const fc = favg > 0 ? "#145a2d" : "#8b1a1a";
      fwdAvgCell = "<span style='font-weight:700;color:"+fc+"'>"+(favg>0?"+":"")+favg+"</span> <span style='color:#999;font-size:10px'>("+fvals.length+"q)</span>";
      const pc = fpos >= 50 ? "match-good" : "match-low";
      fwdPosCell = "<span class='"+pc+"'>"+fpos+"%</span>";
    }

    html += "<tr>"
      + "<td class='sim-rank'>"+(idx+1)+"</td>"
      + "<td class='sim-date'>"+r.date+"</td>"
      + "<td>"+dowOf(r.date)+"</td>"
      + "<td class='"+mcls+"'>"+r.match+"/"+r.matchTotal+" ("+r.matchPct+"%)</td>"
      + "<td><div class='sim-bar-wrap'><div class='sim-bar' style='width:"+Math.max(2,closeness)+"px'></div><span>"+Math.round(r.mae)+" MW</span></div></td>"
      + "<td>"+fwdAvgCell+"</td>"
      + "<td>"+fwdPosCell+"</td>"
      + "<td><button class='sim-view-btn' data-view='"+r.date+"'>View</button></td>"
      + "</tr>";
  });
  html += "</tbody>";
  tableEl.innerHTML = html;

  // View butonlari
  tableEl.querySelectorAll(".sim-view-btn").forEach(b => {
    b.addEventListener("click", () => {
      const ds = b.dataset.view;
      // hem target hem secilen gun gorunsun: tarih araligini ayarla
      highlightDate = targetDate;
      const lo = ds < targetDate ? ds : targetDate;
      const hi = ds < targetDate ? targetDate : ds;
      document.getElementById("startDate").value = lo;
      document.getElementById("endDate").value = hi;
      resetActiveToRange();
      // sadece bu iki gunu aktif birak
      activeDates = new Set([ds, targetDate].filter(d => ALL_DATA[d]));
      buildDayFilter();
      buildStats();
      render();
      window.scrollTo({top:0, behavior:"smooth"});
    });
  });

  // Baslik tiklayinca sirala
  tableEl.querySelectorAll("th[data-s]").forEach(th => {
    th.addEventListener("click", () => {
      document.getElementById("simSort").value = th.dataset.s;
      computeSimilarity();
    });
  });
}

// ---------- Olaylar ----------
const VAR_LABELS = {aep:"IMB", id1:"ID1", id3:"ID3", spot:"SPOT", vwap:"VWAP"};

function renderSpread() {
  const dates = Array.from(activeDates).sort();
  const v1 = document.getElementById("var1").value;
  const v2 = document.getElementById("var2").value;
  const scaleMode = document.getElementById("scaleMode").value;
  const viewMode  = document.getElementById("viewMode").value;
  const outer = document.getElementById("spreadOuter");
  if (!dates.length){ outer.innerHTML='<div class="empty-msg">No dates selected.</div>'; return; }

  const sVal = (ds,key) => {
    const a = metricVal(v1, ds, key), b = metricVal(v2, ds, key);
    if (a === null || b === null) return null;
    return Math.round((a - b) * 100) / 100;
  };

  let gMin=Infinity, gMax=-Infinity;
  ROWS.forEach(r=>dates.forEach(ds=>{ const v=sVal(ds,r); if(v!==null){gMin=Math.min(gMin,v);gMax=Math.max(gMax,v);} }));
  if(scaleMode==="sym500"){gMin=-500;gMax=500;}
  if(scaleMode==="sym1000"){gMin=-1000;gMax=1000;}
  if(gMin===Infinity){ outer.innerHTML='<div class="empty-msg">No data for '+VAR_LABELS[v1]+' - '+VAR_LABELS[v2]+' yet.</div>'; return; }

  let html="<table><thead><tr>";
  html+='<th class="th-corner">Hour / Qtr</th>';
  dates.forEach(ds=>{
    let cls="th-day"; if(isWeekend(ds)) cls+=" weekend"; if(ds===highlightDate) cls+=" target";
    html+='<th class="'+cls+'"><div>'+dayNum(ds)+'</div><div style="font-size:9px;font-weight:400;color:#aaa">'+dowOf(ds)+'</div></th>';
  });
  html+='<th class="th-avg"><div style="display:flex;gap:6px;justify-content:center">Avg <span style="font-size:9px;color:#999;font-weight:400">| Pos%</span></div></th>';
  html+="</tr></thead><tbody>";

  ROWS.forEach(rowKey=>{
    const [hr,qr]=rowKey.split("-");
    const isQ1=qr==="Q1";
    const rowVals=dates.map(ds=>sVal(ds,rowKey));
    let rMin=Infinity,rMax=-Infinity;
    if(scaleMode==="row") rowVals.forEach(v=>{if(v!==null){rMin=Math.min(rMin,v);rMax=Math.max(rMax,v);}});
    const useMin=scaleMode==="row"?(rMin===Infinity?-100:rMin):gMin;
    const useMax=scaleMode==="row"?(rMax===-Infinity?100:rMax):gMax;

    html+="<tr"+(isQ1?' class="hour-sep"':"")+">";
    html+='<th class="th-row"><span class="hour">'+hr+':00</span><span class="qtr">'+qr+'</span></th>';
    rowVals.forEach((v,di)=>{
      const ds=dates[di];
      const wb=isWeekend(ds)?"border-left:2px solid #c0d4f0;":"";
      if(v===null){html+='<td class="cell" style="background:#f5f4f0;color:#ccc;'+wb+'">-</td>';return;}
      const bg=getColor(v,useMin,useMax), tc=textCol(v,useMin,useMax);
      html+='<td class="cell spread-cell" style="background:'+bg+';color:'+tc+';'+wb+'" data-v="'+v+'" data-row="'+rowKey+'" data-date="'+ds+'">'+fmtVal(v,viewMode)+'</td>';
    });
    const valid=rowVals.filter(v=>v!==null);
    if(valid.length){
      const avg=Math.round(valid.reduce((a,b)=>a+b,0)/valid.length*100)/100;
      const posPct=Math.round(valid.filter(v=>v>0).length/valid.length*100);
      const pctClass=posPct>=50?"up":"down";
      html+='<td class="avg-cell" style="background:'+getColor(avg,useMin,useMax)+';color:'+textCol(avg,useMin,useMax)+'"><div class="avg-inner"><span>'+fmtVal(avg,viewMode)+'</span><span class="avg-pct '+pctClass+'">+'+posPct+'%</span></div></td>';
    } else { html+='<td class="avg-cell" style="background:#f0ede8;color:#ccc">-</td>'; }
    html+="</tr>";
  });
  html+="</tbody></table>";
  outer.innerHTML=html;

  outer.querySelectorAll("td.spread-cell[data-v]").forEach(td=>{
    td.addEventListener("mousemove",e=>{
      const v=parseFloat(td.dataset.v);
      const [hr,qr]=td.dataset.row.split("-");
      const ds=td.dataset.date;
      const a=metricVal(v1,ds,td.dataset.row), b=metricVal(v2,ds,td.dataset.row);
      const s=metricVal("saldo",ds,td.dataset.row);
      tooltip.style.display="block";
      tooltip.style.left=(e.clientX+14)+"px";
      tooltip.style.top=(e.clientY-40)+"px";
      tooltip.innerHTML="<b>"+ds+" "+dowOf(ds)+" "+hr+":"+QTR_MIN[qr]+"</b><br>"
        +"<span style='font-weight:600;color:"+(v>0?"#1a7a3a":"#b22222")+"'>"+VAR_LABELS[v1]+" - "+VAR_LABELS[v2]+": "+(v>0?"+":"")+v+" EUR/MWh</span>"
        +"<br><span style='color:#666'>"+VAR_LABELS[v1]+": "+(a===null?"-":a)+" | "+VAR_LABELS[v2]+": "+(b===null?"-":b)+"</span>"
        +"<br><span style='color:#666'>Saldo: "+(s===null?"-":(s>0?"+":"")+s+" MW")+"</span>";
    });
    td.addEventListener("mouseleave",()=>{tooltip.style.display="none";});
  });
}

document.getElementById("startDate").addEventListener("change", onRangeChange);
document.getElementById("endDate").addEventListener("change", onRangeChange);

document.getElementById("scaleMode").addEventListener("change", ()=>{render(); renderSpread();});

document.querySelectorAll(".fwd-btn").forEach(btn=>{

resetActiveToRange();
buildDayFilter();
buildStats();
render();
renderSpread();
computeSimilarity();
