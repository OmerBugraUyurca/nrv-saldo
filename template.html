<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Germany NRV Balance</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; padding: 20px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
  .updated { font-size: 11px; color: #aaa; margin-bottom: 16px; }
  .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-bottom: 14px; }
  .ctrl-group { display: flex; align-items: center; gap: 6px; }
  .ctrl-group label { font-size: 12px; color: #555; }
  select, input[type=date] { font-size: 12px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 5px; background: #fff; cursor: pointer; }
  .legend-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .grad { width: 180px; height: 10px; border-radius: 3px; background: linear-gradient(to right, #b22222, #e8a0a0, #f5f0ee, #a0d4b0, #1a7a3a); }
  .legend-wrap span { font-size: 11px; color: #666; }
  .daterange { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 14px; padding: 10px 14px; background: #fff; border: 1px solid #ddd; border-radius: 7px; }
  .daterange label { font-size: 12px; color: #555; font-weight: 600; }
  .quick-btn { font-size: 11px; font-weight: 600; padding: 4px 10px; border: 1px solid #bbb; border-radius: 5px; background: #f7f5f1; cursor: pointer; color: #333; }
  .quick-btn:hover { background: #e8e4dc; }
  .day-filter { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; margin-bottom: 12px; }
  .df-btn { font-size: 11px; font-weight: 600; padding: 3px 8px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; color: #555; }
  .df-btn.active { background: #3266ad; color: #fff; border-color: #3266ad; }
  .df-btn.df-special { background: #f7f5f1; border-color: #bbb; color: #333; }
  .df-btn.df-special:hover { background: #e8e4dc; }
  .df-sep { width: 1px; height: 20px; background: #ddd; margin: 0 4px; display: inline-block; }
  .table-outer { overflow: auto; max-height: 80vh; border: 1px solid #ddd; border-radius: 8px; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  table { border-collapse: collapse; font-size: 11px; white-space: nowrap; }
  th, td { padding: 0; border: 0; }
  .th-corner { position: sticky; left: 0; top: 0; z-index: 5; background: #f0ede8; padding: 5px 10px; font-size: 10px; color: #888; border-right: 1px solid #d5d2cc; border-bottom: 1px solid #d5d2cc; min-width: 90px; }
  .th-day { position: sticky; top: 0; z-index: 3; background: #f0ede8; padding: 5px 6px; text-align: center; font-weight: 600; font-size: 11px; color: #444; border-bottom: 1px solid #d5d2cc; min-width: 40px; }
  .th-day.weekend { color: #3266ad; background: #eaf0fb; }
  .th-row { position: sticky; left: 0; z-index: 2; background: #f7f5f1; padding: 2px 8px; border-right: 1px solid #d5d2cc; font-size: 10px; line-height: 1.3; min-width: 90px; }
  .th-row .hour { font-weight: 600; color: #222; }
  .th-row .qtr { color: #999; margin-left: 3px; }
  td.cell { text-align: center; padding: 2px 2px; font-size: 9.5px; font-weight: 600; min-width: 40px; height: 19px; cursor: default; }
  td.cell:hover { outline: 2px solid #333; outline-offset: -1px; position: relative; z-index: 1; }
  .th-avg { position: sticky; top: 0; right: 0; z-index: 4; background: #e8e4dc; padding: 5px 6px; text-align: center; font-weight: 700; font-size: 11px; color: #333; border-bottom: 1px solid #d5d2cc; border-left: 2px solid #bbb; min-width: 90px; }
  td.avg-cell { position: sticky; right: 0; z-index: 1; padding: 1px 4px; font-size: 9.5px; font-weight: 700; min-width: 90px; height: 19px; border-left: 2px solid #bbb; display: table-cell; vertical-align: middle; }
  .avg-inner { display: flex; align-items: center; justify-content: space-between; gap: 3px; }
  .avg-pct { font-size: 8.5px; font-weight: 700; padding: 1px 4px; border-radius: 3px; }
  .avg-pct.up { background: rgba(26,122,58,0.18); color: #145a2d; }
  .avg-pct.down { background: rgba(178,34,34,0.15); color: #8b1a1a; }
  .hour-sep td, .hour-sep th { border-top: 1px solid #ccc; }
  .tooltip { position: fixed; background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 7px 11px; font-size: 11px; color: #222; pointer-events: none; display: none; z-index: 9999; box-shadow: 0 3px 10px rgba(0,0,0,0.12); line-height: 1.6; }
  .stat-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .stat { background: #fff; border: 1px solid #ddd; border-radius: 7px; padding: 8px 14px; min-width: 110px; }
  .stat-label { font-size: 10px; color: #888; margin-bottom: 2px; }
  .stat-value { font-size: 18px; font-weight: 600; color: #222; }
  .stat-sub { font-size: 10px; color: #aaa; }
  .empty-msg { padding: 30px; text-align: center; color: #999; font-size: 13px; }
</style>
</head>
<body>
<h1>Germany NRV Balance (System Direction)</h1>
<p class="subtitle">15-min quarters per hour x day | Unit: MW | Positive = Short, Negative = Long</p>
<p class="updated">Last updated: __UPDATED_AT__</p>

<div class="stat-row" id="statRow"></div>

<div class="daterange">
  <label>From:</label>
  <input type="date" id="startDate" min="__FIRST_DATE__" max="__LAST_DATE__" value="__FIRST_DATE__">
  <label>To:</label>
  <input type="date" id="endDate" min="__FIRST_DATE__" max="__LAST_DATE__" value="__LAST_DATE__">
  <button class="quick-btn" data-range="7">Last 7 days</button>
  <button class="quick-btn" data-range="30">Last 30 days</button>
  <button class="quick-btn" data-range="all">All</button>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Color scale:</label>
    <select id="scaleMode">
      <option value="global">Global</option>
      <option value="sym500">+/-500 MW</option>
      <option value="sym1000">+/-1000 MW</option>
      <option value="row">Row-relative</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Display:</label>
    <select id="viewMode">
      <option value="value">Value (MW)</option>
      <option value="sign">Direction (+/-)</option>
      <option value="abs">Absolute</option>
    </select>
  </div>
</div>

<div class="day-filter" id="dayFilter">
  <span style="font-size:12px;color:#555;margin-right:6px">Quick:</span>
  <button class="df-btn df-special" data-action="all">All in range</button>
  <button class="df-btn df-special" data-action="weekdays">Weekdays</button>
  <button class="df-btn df-special" data-action="weekends">Weekends</button>
  <span class="df-sep"></span>
</div>

<div class="legend-wrap">
  <span>Long (-)</span>
  <div class="grad"></div>
  <span>(+) Short</span>
</div>

<div class="table-outer" id="tableOuter"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const ALL_DATA = __DATA_JSON__;
const ALL_DATES = Object.keys(ALL_DATA).sort();

const ROWS = [];
for (let h = 0; h < 24; h++)
  for (const q of ["Q1","Q2","Q3","Q4"])
    ROWS.push(String(h).padStart(2,"0") + "-" + q);

const QTR_MIN = {Q1:"00",Q2:"15",Q3:"30",Q4:"45"};
const DOW_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function dowOf(ds) {
  const [y,m,d] = ds.split("-").map(Number);
  return DOW_NAMES[new Date(y, m-1, d).getDay()];
}
function isWeekend(ds) {
  const [y,m,d] = ds.split("-").map(Number);
  const dow = new Date(y, m-1, d).getDay();
  return dow === 0 || dow === 6;
}
function dayNum(ds) { return Number(ds.split("-")[2]); }

const tooltip = document.getElementById("tooltip");
let activeDates = new Set();

// Hangi tarihler secili aralikta?
function datesInRange() {
  const s = document.getElementById("startDate").value;
  const e = document.getElementById("endDate").value;
  return ALL_DATES.filter(d => d >= s && d <= e);
}

function resetActiveToRange() {
  activeDates = new Set(datesInRange());
}

function buildDayFilter() {
  const container = document.getElementById("dayFilter");
  container.querySelectorAll(".df-btn[data-date]").forEach(b => b.remove());
  const sep = container.querySelector(".df-sep");
  const range = datesInRange();

  range.forEach(ds => {
    const btn = document.createElement("button");
    btn.className = "df-btn" + (activeDates.has(ds) ? " active" : "");
    btn.dataset.date = ds;
    btn.textContent = dayNum(ds) + " " + dowOf(ds);
    if (isWeekend(ds)) btn.style.color = activeDates.has(ds) ? "#fff" : "#3266ad";
    btn.addEventListener("click", () => {
      if (activeDates.has(ds)) {
        if (activeDates.size > 1) { activeDates.delete(ds); btn.classList.remove("active"); btn.style.color = isWeekend(ds)?"#3266ad":"#555"; }
      } else {
        activeDates.add(ds); btn.classList.add("active"); if(isWeekend(ds)) btn.style.color="#fff";
      }
      buildStats(); render();
    });
    container.insertBefore(btn, sep.nextSibling);
  });

  container.querySelector("[data-action=all]").onclick = () => {
    resetActiveToRange(); buildDayFilter(); buildStats(); render();
  };
  container.querySelector("[data-action=weekdays]").onclick = () => {
    activeDates = new Set(datesInRange().filter(d => !isWeekend(d)));
    buildDayFilter(); buildStats(); render();
  };
  container.querySelector("[data-action=weekends]").onclick = () => {
    activeDates = new Set(datesInRange().filter(d => isWeekend(d)));
    buildDayFilter(); buildStats(); render();
  };
}

function buildStats() {
  const dates = Array.from(activeDates).sort();
  const allVals = [];
  ROWS.forEach(r => dates.forEach(ds => {
    const v = ALL_DATA[ds] ? ALL_DATA[ds][r] : undefined;
    if (v !== undefined) allVals.push(v);
  }));
  if (!allVals.length) { document.getElementById("statRow").innerHTML = ""; return; }
  const pos = allVals.filter(v => v > 0).length;
  const neg = allVals.filter(v => v < 0).length;
  const avg = Math.round(allVals.reduce((a,b)=>a+b,0)/allVals.length);
  const stats = [
    {label:"Total quarters", value: allVals.length, sub:""},
    {label:"Short (positive)", value: pos, sub: (pos/allVals.length*100).toFixed(1)+"%"},
    {label:"Long (negative)", value: neg, sub: (neg/allVals.length*100).toFixed(1)+"%"},
    {label:"Average", value: (avg>0?"+":"")+avg+" MW", sub:""},
    {label:"Min", value: Math.min(...allVals)+" MW", sub:""},
    {label:"Max", value: Math.max(...allVals)+" MW", sub:""},
  ];
  document.getElementById("statRow").innerHTML = stats.map(s =>
    '<div class="stat"><div class="stat-label">'+s.label+'</div><div class="stat-value">'+s.value+'</div><div class="stat-sub">'+s.sub+'</div></div>'
  ).join("");
}

function getColor(v, mn, mx) {
  if (v === 0) return "#f0ede8";
  if (v > 0) {
    const t = Math.min(v/mx, 1);
    return "rgb("+Math.round(220-t*110)+","+Math.round(235-t*50)+","+Math.round(220-t*140)+")";
  } else {
    const t = Math.min(Math.abs(v)/Math.abs(mn), 1);
    return "rgb("+Math.round(220+t*80)+","+Math.round(220-t*150)+","+Math.round(220-t*150)+")";
  }
}
function textCol(v, mn, mx) {
  return (v >= 0 ? v/mx : Math.abs(v)/Math.abs(mn)) > 0.55 ? "#fff" : "#333";
}
function fmtVal(v, mode) {
  if (mode === "sign") return v > 0 ? "+" : v < 0 ? "-" : "0";
  if (mode === "abs") return Math.abs(v) >= 1000 ? (Math.abs(v)/1000).toFixed(1)+"k" : String(Math.abs(v));
  if (Math.abs(v) >= 1000) return (v>0?"+":"")+(v/1000).toFixed(1)+"k";
  return (v>0?"+":"")+v;
}

function render() {
  const dates = Array.from(activeDates).sort();
  const scaleMode = document.getElementById("scaleMode").value;
  const viewMode  = document.getElementById("viewMode").value;

  if (!dates.length) {
    document.getElementById("tableOuter").innerHTML = '<div class="empty-msg">No dates selected.</div>';
    return;
  }

  let gMin = Infinity, gMax = -Infinity;
  ROWS.forEach(r => dates.forEach(ds => {
    const v = ALL_DATA[ds] ? ALL_DATA[ds][r] : undefined;
    if (v !== undefined) { gMin = Math.min(gMin,v); gMax = Math.max(gMax,v); }
  }));
  if (scaleMode === "sym500")  { gMin = -500;  gMax = 500; }
  if (scaleMode === "sym1000") { gMin = -1000; gMax = 1000; }
  if (gMin === Infinity) { gMin = -100; gMax = 100; }

  let html = "<table><thead><tr>";
  html += '<th class="th-corner">Hour / Qtr</th>';
  dates.forEach(ds => {
    const wk = isWeekend(ds) ? " weekend" : "";
    html += '<th class="th-day'+wk+'"><div>'+dayNum(ds)+'</div><div style="font-size:9px;font-weight:400;color:#aaa">'+dowOf(ds)+'</div></th>';
  });
  html += '<th class="th-avg"><div style="display:flex;gap:6px;justify-content:center">Avg MW <span style="font-size:9px;color:#999;font-weight:400">| Short%</span></div></th>';
  html += "</tr></thead><tbody>";

  ROWS.forEach(rowKey => {
    const parts = rowKey.split("-");
    const hr = parts[0], qr = parts[1];
    const isQ1 = qr === "Q1";
    const rowVals = dates.map(ds => (ALL_DATA[ds] && ALL_DATA[ds][rowKey] !== undefined) ? ALL_DATA[ds][rowKey] : null);

    let rMin = Infinity, rMax = -Infinity;
    if (scaleMode === "row") rowVals.forEach(v => { if(v!==null){rMin=Math.min(rMin,v);rMax=Math.max(rMax,v);} });
    const useMin = scaleMode === "row" ? (rMin===Infinity?-100:rMin) : gMin;
    const useMax = scaleMode === "row" ? (rMax===-Infinity?100:rMax) : gMax;

    html += "<tr" + (isQ1 ? ' class="hour-sep"' : "") + ">";
    html += '<th class="th-row"><span class="hour">'+hr+':00</span><span class="qtr">'+qr+'</span></th>';

    rowVals.forEach((v, di) => {
      const ds = dates[di];
      const wb = isWeekend(ds) ? "border-left:2px solid #c0d4f0;" : "";
      if (v === null) { html += '<td class="cell" style="background:#f5f4f0;color:#ccc;'+wb+'">-</td>'; return; }
      const bg = getColor(v, useMin, useMax);
      const tc = textCol(v, useMin, useMax);
      html += '<td class="cell" style="background:'+bg+';color:'+tc+';'+wb+'" data-v="'+v+'" data-row="'+rowKey+'" data-date="'+ds+'">'+fmtVal(v,viewMode)+'</td>';
    });

    const valid = rowVals.filter(v => v !== null);
    if (valid.length) {
      const avg = Math.round(valid.reduce((a,b)=>a+b,0)/valid.length);
      const shortPct = Math.round(valid.filter(v=>v>0).length/valid.length*100);
      const pctClass = shortPct >= 50 ? "up" : "down";
      const pctLabel = shortPct >= 50 ? "S "+shortPct+"%" : "L "+(100-shortPct)+"%";
      const avgBg = getColor(avg, useMin, useMax);
      const avgTc = textCol(avg, useMin, useMax);
      html += '<td class="avg-cell" style="background:'+avgBg+';color:'+avgTc+'" data-v="'+avg+'" data-row="'+rowKey+'" data-date="avg" data-short="'+shortPct+'"><div class="avg-inner"><span>'+fmtVal(avg,viewMode)+'</span><span class="avg-pct '+pctClass+'">'+pctLabel+'</span></div></td>';
    } else {
      html += '<td class="avg-cell" style="background:#f0ede8;color:#ccc">-</td>';
    }
    html += "</tr>";
  });

  html += "</tbody></table>";
  document.getElementById("tableOuter").innerHTML = html;

  document.getElementById("tableOuter").querySelectorAll("td[data-v]").forEach(td => {
    td.addEventListener("mousemove", e => {
      const v = parseFloat(td.dataset.v);
      const parts = td.dataset.row.split("-");
      const hr = parts[0], qr = parts[1];
      const ds = td.dataset.date;
      const dir = v > 0 ? "Short" : v < 0 ? "Long" : "Balanced";
      const dc  = v > 0 ? "#1a7a3a" : v < 0 ? "#b22222" : "#888";
      const label = ds === "avg"
        ? hr+":"+QTR_MIN[qr]+" - Average"
        : ds+" "+dowOf(ds)+" "+hr+":"+QTR_MIN[qr];
      tooltip.style.display = "block";
      tooltip.style.left = (e.clientX+14)+"px";
      tooltip.style.top  = (e.clientY-40)+"px";
      tooltip.innerHTML = "<b>"+label+"</b><br><span style=\"color:"+dc+";font-weight:600\">"+dir+": "+(v>0?"+":"")+v+" MW</span>";
    });
    td.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });
  });
}

function onRangeChange() {
  resetActiveToRange();
  buildDayFilter();
  buildStats();
  render();
}

document.getElementById("startDate").addEventListener("change", onRangeChange);
document.getElementById("endDate").addEventListener("change", onRangeChange);

document.querySelectorAll(".quick-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const r = btn.dataset.range;
    const last = ALL_DATES[ALL_DATES.length-1];
    if (r === "all") {
      document.getElementById("startDate").value = ALL_DATES[0];
    } else {
      const n = Number(r);
      const idx = Math.max(0, ALL_DATES.length - n);
      document.getElementById("startDate").value = ALL_DATES[idx];
    }
    document.getElementById("endDate").value = last;
    onRangeChange();
  });
});

document.getElementById("scaleMode").addEventListener("change", render);
document.getElementById("viewMode").addEventListener("change", render);

resetActiveToRange();
buildDayFilter();
buildStats();
render();
</script>
</body>
</html>
