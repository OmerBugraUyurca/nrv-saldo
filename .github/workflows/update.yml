name: Update NRV Saldo

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas python-dateutil energyquantified

      - name: Run fetch and build
        env:
          NTZ_CLIENT_ID:     ${{ secrets.NTZ_CLIENT_ID }}
          NTZ_CLIENT_SECRET: ${{ secrets.NTZ_CLIENT_SECRET }}
          EQ_API_KEY:        ${{ secrets.EQ_API_KEY }}
        run: python fetch_and_build.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          git diff --staged --quiet || git commit -m "Auto update $(date -u +'%Y-%m-%d %H:%M')"
          git push --force
